<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38761d"/>
      <stop offset="100%" stop-color="#2d5e17"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Recycling arrows (simplified) -->
  <g transform="translate(256,256)" fill="none" stroke="#ffffff" stroke-width="28" stroke-linecap="round" stroke-linejoin="round">
    <!-- Arrow 1 (top) -->
    <path d="M-10,-100 L40,-40 L-10,-40" fill="none"/>
    <path d="M0,-100 C80,-100 100,-20 60,40"/>
    <!-- Arrow 2 (bottom-left) -->
    <path d="M-80,60 L-80,0 L-30,60" fill="none"/>
    <path d="M-80,60 C-80,130 -20,140 60,100"/>
    <!-- Arrow 3 (bottom-right) -->
    <path d="M90,40 L40,80 L90,100" fill="none"/>
    <path d="M80,40 C10,-40 -60,-40 -60,20"/>
  </g>
  <!-- Leaf accent -->
  <g transform="translate(380,100) rotate(30)">
    <path d="M0,0 C20,-40 60,-50 40,-10 C30,10 10,15 0,0Z" fill="#e8f5e0" opacity="0.6"/>
  </g>
</svg>